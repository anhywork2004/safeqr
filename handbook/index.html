<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8b0000">
  <title>SafeQR – Sổ tay Sơ cứu Khẩn cấp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/handbook.css">
</head>
<body>

  <div class="bg-ambient"></div>
  <canvas class="particles" id="particles"></canvas>
  <a href="../index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Về trang khẩn cấp
  </a>

  <!-- ═══ NOTEBOOK WRAPPER ═══ -->
  <div class="notebook-scene" id="notebookScene">

    <!-- Drop shadow beneath notebook -->
    <div class="notebook-shadow"></div>

    <!-- CLOSED STATE: cover only (square notebook look) -->
    <div class="notebook-closed" id="notebookClosed">

      <!-- Cover face -->
      <div class="cover-face">
        <!-- Notebook ring holes along left edge -->
        <div class="ring-holes">
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
        </div>

        <!-- Cover content -->
        <div class="cover-inner">
          <div class="cover-badge">SƠ CỨU KHẨN CẤP</div>
          <div class="cover-cross">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
              <circle cx="26" cy="26" r="25" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
              <rect x="21" y="11" width="10" height="30" rx="3" fill="white"/>
              <rect x="11" y="21" width="30" height="10" rx="3" fill="white"/>
            </svg>
          </div>
          <h1 class="cover-title">SỔ TAY<br>SƠ CỨU</h1>
          <p class="cover-sub">Hướng dẫn xử lý nhanh<br>các tình huống khẩn cấp</p>
          <div class="cover-divider"></div>
          <p class="cover-brand">SafeQR · 2026</p>
          <button class="cover-open-btn" id="openBtn" onclick="openNotebook()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Mở sổ tay
          </button>
        </div>

        <!-- Cover page-edge stack (right side) -->
        <div class="cover-pages-edge"></div>
        <!-- Cover bottom edge -->
        <div class="cover-bottom-edge"></div>
      </div>
    </div>

    <!-- OPEN STATE: two-page spread -->
    <div class="notebook-open" id="notebookOpen">

      <!-- Left cover (inside of front cover, stays left when open) -->
      <div class="open-cover-left" id="openCoverLeft">
        <div class="inside-cover-content">
          <div class="inside-cross">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
              <rect x="14" y="7" width="8" height="22" rx="2" fill="rgba(255,255,255,0.6)"/>
              <rect x="7" y="14" width="22" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
            </svg>
          </div>
          <p class="inside-title">SỔ TAY SƠ CỨU</p>
          <p class="inside-sub">SafeQR · 2026</p>
        </div>
        <!-- Ring holes on left cover -->
        <div class="open-ring-holes">
          <div class="ring"></div><div class="ring"></div><div class="ring"></div>
          <div class="ring"></div><div class="ring"></div>
        </div>
      </div>

      <!-- Spine / gutter -->
      <div class="open-spine">
        <div class="spine-shadow-left"></div>
        <div class="spine-shadow-right"></div>
        <div class="spine-line"></div>
      </div>

      <!-- Right page area (content pages) -->
      <div class="pages-wrapper" id="pagesWrapper">
        <!-- Current page content -->
        <div class="nb-page nb-page-left" id="pageLeft">
          <div class="page-content" id="pageLeftContent"></div>
        </div>
        <div class="nb-page nb-page-right" id="pageRight">
          <div class="page-content" id="pageRightContent"></div>
        </div>

        <!-- Page flip overlay -->
        <div class="page-flip-overlay" id="pageFlipOverlay">
          <div class="flip-reveal" id="flipReveal"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Controls bar -->
  <div class="nb-controls" id="nbControls">
    <button class="nb-ctrl-btn" id="btnPrev" onclick="prevPage()" title="Trang trước">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="nb-ctrl-center">
      <div class="nb-dots" id="pageDots"></div>
      <span class="nb-indicator" id="pageIndicator">1 / 5</span>
    </div>
    <button class="nb-ctrl-btn" id="btnNext" onclick="nextPage()" title="Trang sau">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- TOC -->
  <button class="toc-btn" id="tocBtn" onclick="toggleTOC()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Mục lục
  </button>
  <div class="toc-panel" id="tocPanel"></div>

  <div class="swipe-hint" id="swipeHint">← Vuốt để lật trang →</div>

  <script src="../js/handbook.js"></script>
</body>
</html>
