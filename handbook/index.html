<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8b0000">
  <title>SafeQR – Sổ tay Sơ cứu Khẩn cấp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/handbook.css">
</head>
<body>

  <div class="bg-ambient"></div>
  <canvas class="particles" id="particles"></canvas>

  <a href="https://safeqr-drd.pages.dev/" class="back-link" aria-label="Về trang khẩn cấp">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    Về trang khẩn cấp
  </a>

  <!-- ═══ BOOK SCENE ═══ -->
  <div class="book-scene" id="bookScene">
    <div class="book-ground-shadow"></div>

    <div class="book" id="book">

      <!-- 3D back cover depth layer -->
      <div class="book-back" aria-hidden="true"></div>
      <!-- Page thickness right edge -->
      <div class="pages-thickness" aria-hidden="true"></div>

      <!-- STATIC SPREAD: always visible, content swaps instantly under flip-leaf -->
      <div class="spread" id="spread" aria-live="polite">
        <div class="spread-left" id="spreadLeft">
          <div class="page-inner" id="pageLeftContent"></div>
        </div>
        <div class="spine" aria-hidden="true">
          <div class="spine-highlight"></div>
        </div>
        <div class="spread-right" id="spreadRight">
          <div class="page-inner" id="pageRightContent"></div>
        </div>
      </div>

      <!-- FLIP LEAF: the half-page panel that rotates -->
      <div class="flip-leaf" id="flipLeaf" aria-hidden="true">
        <div class="flip-leaf-front" id="flipFront"></div>
        <div class="flip-leaf-back" id="flipBack"></div>
      </div>

      <!-- FRONT COVER: z-index 30, flips open on click -->
      <div class="cover" id="cover" role="button" tabindex="0" aria-label="Mở sổ tay sơ cứu">

        <div class="cover-texture" aria-hidden="true"></div>

        <div class="cover-ring-band" aria-hidden="true">
          <div class="ring-hole"></div>
          <div class="ring-hole"></div>
          <div class="ring-hole"></div>
          <div class="ring-hole"></div>
          <div class="ring-hole"></div>
          <div class="ring-hole"></div>
        </div>

        <div class="cover-border" aria-hidden="true"></div>

        <div class="cover-body">
          <span class="cover-badge">SƠ CỨU KHẨN CẤP</span>

          <div class="cover-cross" aria-hidden="true">
            <svg width="clamp(44px,8vw,64px)" height="clamp(44px,8vw,64px)" viewBox="0 0 64 64" fill="none">
              <circle cx="32" cy="32" r="30" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
              <rect x="25" y="12" width="14" height="40" rx="4" fill="white"/>
              <rect x="12" y="25" width="40" height="14" rx="4" fill="white"/>
            </svg>
          </div>

          <h1 class="cover-title">SỔ TAY<br>SƠ CỨU</h1>
          <div class="cover-rule" aria-hidden="true"></div>
          <p class="cover-sub">Hướng dẫn xử lý nhanh các tình huống khẩn cấp</p>
          <p class="cover-brand">SafeQR · 2026</p>

          <button class="cover-open-btn" id="openBtn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Mở sổ tay
          </button>
        </div>

        <div class="cover-shimmer" aria-hidden="true"></div>
        <div class="cover-page-edge" aria-hidden="true"></div>
      </div>

      <!-- Close book button (on spread-left, visible when open) -->
      <button class="close-book-btn" id="closeBtn" type="button" aria-label="Đóng sổ tay">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        Đóng
      </button>

    </div>
  </div>

  <!-- Controls bar -->
  <div class="controls" id="controls" role="navigation" aria-label="Điều hướng trang sách">
    <button class="ctrl-btn" id="btnPrev" type="button" title="Trang trước" aria-label="Trang trước" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="ctrl-center">
      <div class="dots" id="dots" role="tablist" aria-label="Chọn trang"></div>
      <span class="page-indicator" id="pageIndicator" aria-live="polite">1 / 5</span>
    </div>
    <button class="ctrl-btn" id="btnNext" type="button" title="Trang sau" aria-label="Trang sau">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <button class="toc-btn" id="tocBtn" type="button" aria-label="Mở mục lục" aria-expanded="false">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Mục lục
  </button>
  <div class="toc-panel" id="tocPanel" role="dialog" aria-label="Mục lục" hidden></div>

  <script src="../js/handbook.js"></script>
</body>
</html>
